name: dependency-governance

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - deny.toml
      - scripts/dependency_governance_check.sh
      - docs/dependency-governance.md
      - .github/workflows/dependency-governance.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo artifacts
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install governance tools
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2
        with:
          tool: cargo-deny,cargo-audit,cargo-outdated

      - name: Run dependency governance checks
        env:
          STRICT_OUTDATED: "0"
        run: ./scripts/dependency_governance_check.sh
